services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wikibridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikibridge}
      POSTGRES_DB: ${POSTGRES_DB:-wikibridge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    # Acceso externo opcional (DBeaver). Si el puerto está ocupado, comenta esta sección
    # y usa: docker compose exec postgres psql -U wikibridge -d wikibridge
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikibridge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wikibridge}:${POSTGRES_PASSWORD:-wikibridge}@postgres:5432/${POSTGRES_DB:-wikibridge}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wikibridge}:${POSTGRES_PASSWORD:-wikibridge}@postgres:5432/${POSTGRES_DB:-wikibridge}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    env_file:
      - ../.env
    environment:
      INTERNAL_API_URL: http://api:8000
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_URL: http://localhost:${WEB_PORT:-3000}
      AUTH_MODE: ${AUTH_MODE:-local}
      LOCAL_AUTH_USERNAME: ${LOCAL_AUTH_USERNAME:-admin}
      LOCAL_AUTH_PASSWORD: ${LOCAL_AUTH_PASSWORD:-admin}
      LOCAL_AUTH_ROLE: ${LOCAL_AUTH_ROLE:-admin}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
