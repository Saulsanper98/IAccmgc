# Solo infraestructura para desarrollo en casa (PostgreSQL + Redis)
# Uso: docker compose -f infra/docker-compose.home.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wikibridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikibridge}
      POSTGRES_DB: ${POSTGRES_DB:-wikibridge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_home_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikibridge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_home_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_home_data:
  redis_home_data:
